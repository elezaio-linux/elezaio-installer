# ╔══════════════════════════════════════════════════════╗
# ║          Installer Configuration                     ║
# ║  Edit this file to rebrand for your own distro       ║
# ╚══════════════════════════════════════════════════════╝

# ── Branding ─────────────────────────────────────────────────
INSTALLER_TITLE="Elezaio Linux Installer"
INSTALLER_VERSION="2026.3r11"
INSTALLER_CODENAME="Nova"
INSTALLER_REPO="https://github.com/elezaio-linux"

# ── Paths ─────────────────────────────────────────────────────
MOUNT="/mnt/elezaio"
LOG="/var/log/elezaio-install.log"

# ── Default system settings ───────────────────────────────────
DEFAULT_HOSTNAME="elezaio"
DEFAULT_USER="user"
DEFAULT_LANG="en_US.UTF-8"
DEFAULT_KB="us"

# ── Session / Login manager ───────────────────────────────────
# The session name must match a .desktop file in /usr/share/wayland-sessions/
# or /usr/share/xsessions/
LOGIN_MANAGER="greetd"           # sddm or greetd
SESSION_NAME="mango"           # session to autostart

# ── APT Sources ───────────────────────────────────────────────
APT_SOURCES='deb http://deb.debian.org/debian trixie main contrib non-free non-free-firmware
deb http://deb.debian.org/debian trixie-updates main contrib non-free non-free-firmware
deb http://security.debian.org/debian-security trixie-security main contrib non-free non-free-firmware'

# ── Packages to install ───────────────────────────────────────
# Add or remove packages as needed for your distro
PACKAGES_COMPOSITOR="swaybg waybar wofi dunst grim slurp wl-clipboard brightnessctl playerctl"
PACKAGES_AUDIO="pipewire pipewire-pulseaudio wireplumber"
PACKAGES_NETWORK="network-manager network-manager-gnome"
PACKAGES_LOGIN="greetd"
PACKAGES_PERFORMANCE="tlp tlp-rdw zram-tools irqbalance systemd-resolved"
PACKAGES_SHELL="zsh kitty fastfetch curl jq"
PACKAGES_FONTS="fonts-jetbrains-mono fonts-noto-core"
PACKAGES_APPS="firefox-esr thunar mousepad"
PACKAGES_THEME="arc-theme papirus-icon-theme"
PACKAGES_EXTRA="openssh-server"

# ── Services to enable ────────────────────────────────────────
SERVICES_ENABLE="NetworkManager tlp irqbalance zramswap systemd-resolved greetd"
SERVICES_DISABLE="bluetooth ModemManager apt-daily apt-daily-upgrade"

# ── User groups ───────────────────────────────────────────────
USER_GROUPS="sudo,video,input,audio,seat,render,netdev"

# ── Sysctl tweaks ─────────────────────────────────────────────
SYSCTL_TWEAKS='vm.swappiness=10
vm.vfs_cache_pressure=50
vm.dirty_ratio=10
vm.dirty_background_ratio=5
net.core.netdev_max_backlog=16384
net.ipv4.tcp_fastopen=3
kernel.nmi_watchdog=0
kernel.unprivileged_userns_clone=1'

# ── DNS servers ───────────────────────────────────────────────
DNS_PRIMARY="1.1.1.1"
DNS_SECONDARY="1.0.0.1"
DNS_FALLBACK="9.9.9.9"

# ── Zram ──────────────────────────────────────────────────────
ZRAM_ALGO="zstd"
ZRAM_PERCENT="50"

# ── Live packages to remove after install ─────────────────────
LIVE_PACKAGES="live-boot live-boot-initramfs-tools live-config live-config-systemd live-tools"

# ── GRUB ──────────────────────────────────────────────────────
GRUB_TIMEOUT="3"
GRUB_CMDLINE='quiet splash'
GRUB_DISTRIBUTOR="Elezaio Linux"
GRUB_BOOTLOADER_ID="Elezaio"

# ── Post-install hook (optional) ──────────────────────────────
# Path to a script that runs inside chroot after install
# Leave empty to skip
POST_INSTALL_HOOK=""
